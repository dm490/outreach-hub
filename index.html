<!doctype html>
<html lang="en">
  <head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="icon" href="/dj-icon.svg" type="image/svg+xml">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ Recruiter</title>
    <style>
      *{box-sizing:border-box}
      html,body{max-width:100vw;overflow-x:hidden}
      @media(max-width:768px){
        .dj-main{padding:16px 10px!important}
        .dj-stats{grid-template-columns:repeat(2,1fr)!important}
        .dj-grid2{grid-template-columns:1fr!important}
        .dj-kpi-grid{grid-template-columns:repeat(2,1fr)!important}
        .dj-tabs{width:100%!important;overflow-x:auto!important}
        .dj-tabs button{padding:6px 10px!important;font-size:10px!important}
        div[style*="grid-template-columns: repeat(4"]{grid-template-columns:repeat(2,1fr)!important}
        div[style*="grid-template-columns: repeat(5"]{grid-template-columns:repeat(2,1fr)!important}
        div[style*="grid-template-columns: 2fr"]{grid-template-columns:1fr!important}
        div[style*="flex: 0 0 3"]{flex:1 1 100%!important;max-width:100%!important}
        div[style*="maxWidth:1100"]{max-width:100vw!important;padding:10px!important}
        div[style*="max-width:1100"]{max-width:100vw!important;padding:10px!important}
        div[style*="display: flex"][style*="gap: 24"]{flex-direction:column!important}
        div[style*="display:\"flex\""][style*="gap:24"]{flex-direction:column!important}
        input[style*="width:200"],input[style*="width: 200"]{width:100%!important}
        input[style*="width:300"],input[style*="width: 300"]{width:100%!important}
        div[style*="justifyContent"][style*="space-between"]{flex-wrap:wrap!important}
        div[style*="justify-content"][style*="space-between"]{flex-wrap:wrap!important}
        button{max-width:100%!important}
        div[style*="display:\"flex\""][style*="gap:6"] {flex-wrap:wrap!important}
        div[style*="display: flex"][style*="gap: 6"]{flex-wrap:wrap!important}
        div[style*="display:\"flex\""][style*="gap:4"] {flex-wrap:wrap!important}
        div[style*="display: flex"][style*="gap: 4"]{flex-wrap:wrap!important}
        div[style*="display:\"flex\""][style*="gap:8"] {flex-wrap:wrap!important}
        div[style*="display: flex"][style*="gap: 8"]{flex-wrap:wrap!important}
        div[style*="marginLeft:20"]{margin-left:0!important;margin-top:12px!important}
        div[style*="margin-left:20"]{margin-left:0!important;margin-top:12px!important}
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
