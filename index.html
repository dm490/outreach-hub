<!doctype html>
<html lang="en">
  <head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="icon" href="/dj-icon.svg" type="image/svg+xml">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ Recruiter</title>
    <style>
      html,body{max-width:100vw;overflow-x:hidden}
      @media(max-width:768px){
        .dj-main{padding:16px 12px!important}
        .dj-stats{grid-template-columns:repeat(2,1fr)!important}
        .dj-grid2{grid-template-columns:1fr!important}
        .dj-kpi-grid{grid-template-columns:repeat(2,1fr)!important}
        .dj-tabs{width:100%!important}
        .dj-tabs button{padding:6px 10px!important;font-size:10px!important}
        div[style*="grid-template-columns: repeat(4"]{grid-template-columns:repeat(2,1fr)!important}
        div[style*="grid-template-columns: repeat(5"]{grid-template-columns:repeat(2,1fr)!important}
        div[style*="grid-template-columns: 2fr"]{grid-template-columns:1fr!important}
        div[style*="flex: 0 0 3"]{flex:1 1 100%!important;max-width:100%!important}
        div[style*="maxWidth:1100"]{max-width:100%!important;padding:12px!important}
        div[style*="max-width:1100"]{max-width:100%!important;padding:12px!important}
        div[style*="display: flex"][style*="gap: 24"]{flex-direction:column!important}
        input[style*="width:200"],input[style*="width: 200"]{width:100%!important}
        input[style*="width:300"],input[style*="width: 300"]{width:100%!important}
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
